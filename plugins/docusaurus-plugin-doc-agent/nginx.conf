upstream upstream_aicoding {
    server aicoding.xxx.com:443;
}

upstream upstream_gitlab {
    server gitlab.com:443;
}

map $request_uri $gitlab_readonly_uri {
    ~^/gitlab-readonly(.+)$  $1;
    default                  /;
}

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    #access_log  /var/log/nginx/host.access.log  main;
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # ==========================================================
    # API 接口反向代理配置（包含安全封装与跨域支持）
    # ==========================================================

    # GitLab OAuth API 反向代理（前端带 OAuth Token）
    # 使用 HTTPS 代理，自动支持域名解析并消除硬编码内网 IP，实现传输加密
    location ^~ /gitlab-oauth/ {
        proxy_pass https://upstream_gitlab/;
        proxy_ssl_server_name on;
        proxy_ssl_name gitlab.com; # 【高阶提升】显式指定 SNI 域名，完美解决 upstream TLS 握手验证问题

        proxy_set_header Host gitlab.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 路径补斜杠、项目重命名等场景，后端会 302 到 gitlab.com，需替换为相对路径
        proxy_redirect http://gitlab.com/ /;

        # 解决跨域：在 Nginx 层面强行注入跨域头
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Private-Token' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Private-Token';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # GitLab 只读 API 代理（注入 Assets Token，AI Agent 等公共读取用）
    # 使用 map + $request_uri 避免 nginx 解码 %2F（Files API 需要编码路径）
    # 使用 HTTPS 代理，自动支持域名解析并消除硬编码内网 IP，实现传输加密
    location ^~ /gitlab-readonly/ {
        proxy_pass https://upstream_gitlab$gitlab_readonly_uri;
        proxy_ssl_server_name on;
        proxy_ssl_name gitlab.com; # 【高阶提升】显式指定 SNI 域名，完美解决 upstream TLS 握手验证问题

        proxy_set_header Host gitlab.com;
        proxy_set_header Private-Token xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_redirect http://gitlab.com/ /;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # AI 文档助手 API 代理（注入 API Key，前端不碰密钥）
    # API 通过 HTTPS 代理，保留 SNI 和 Host 头以匹配证书。
    # proxy_pass 末尾 of / 用于剥掉 /agent/ 前缀（等同于 dev 环境的 pathRewrite）
    location ^~ /agent/ {
        proxy_pass https://upstream_aicoding/;
        proxy_ssl_server_name on;
        proxy_set_header Host aicoding.xxx.com;
        proxy_set_header x-api-key sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx;
        proxy_set_header Authorization "Bearer sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx";
        proxy_set_header Content-Type application/json;
        proxy_set_header X-Real-IP $remote_addr;

        # 流式响应必须关闭缓冲
        proxy_buffering off;
        proxy_http_version 1.1;
        chunked_transfer_encoding on;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
